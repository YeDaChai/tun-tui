mode: rule
ipv6: false
log-level: warning
geodata-mode: false
geo-auto-update: false
external-controller: 127.0.0.1:9090

geox-url:
  mmdb: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53

proxy-providers:
  subscription:
    type: http
    url: ""
    interval: 3600
    path: ./providers/subscription.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: PROXY
    type: select
    use:
      - subscription
    proxies:
      - DIRECT

rules:
  - MATCH,PROXY
